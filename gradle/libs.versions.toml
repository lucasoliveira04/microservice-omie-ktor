[versions]
kotlin = "2.3.20"
logback = "1.5.21"

[libraries]
logback-classic = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }
rabbitmq-client = { module = "com.rabbitmq:amqp-client", version = "5.22.0" }
lettuce-core = { module = "io.lettuce:lettuce-core", version = "6.5.0.RELEASE" }
kotlinx-coroutines-reactive = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-reactive", version = "1.10.2" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }